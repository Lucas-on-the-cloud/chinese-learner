<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài viết — TOCFL FAFA</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;font-size:15px;color:#1f2937;background:#f4f5f7;display:flex;flex-direction:column;min-height:100vh}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
:root{--blue:#1a56db;--blue-dark:#1544b8;--blue-lt:#eff6ff;--orange:#f47b20;--navy:#0d1b4b;--text:#1f2937;--text-2:#6b7280;--border:#e5e7eb;--surface:#fff}
.navbar{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid var(--border);height:62px;display:flex;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.navbar .container{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1100px;margin:0 auto;padding:0 1.5rem}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-brand img{height:32px;border-radius:5px}
.nav-brand-text{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--navy)}
.nav-brand-text em{color:var(--orange);font-style:normal}
.nav-menu{display:flex;align-items:center;gap:2px}
.nav-link{font-size:14px;font-weight:500;color:var(--text-2);padding:6px 12px;border-radius:6px;transition:all .15s;white-space:nowrap}
.nav-link:hover{color:var(--text);background:#f3f4f6}
.nav-link.active{color:var(--blue);font-weight:600}
.nav-btn{font-size:13px;font-weight:600;color:#fff;background:var(--blue);padding:7px 18px;border-radius:7px;margin-left:8px}
.nav-btn:hover{background:var(--blue-dark)}

.article-wrap{flex:1;max-width:780px;width:100%;margin:0 auto;padding:36px 1.5rem 60px}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-2);margin-bottom:24px}
.breadcrumb a{color:var(--text-2);transition:color .15s}
.breadcrumb a:hover{color:var(--blue)}
.breadcrumb i{font-size:9px;opacity:.5}

.article-cat{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--blue);background:var(--blue-lt);padding:3px 12px;border-radius:10px;margin-bottom:12px}
.article-title{font-family:'Noto Serif TC',serif;font-size:clamp(22px,3vw,32px);font-weight:700;color:var(--navy);line-height:1.3;margin-bottom:14px}
.article-meta{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--text-2);margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.article-meta i{font-size:11px}
.article-cover{width:100%;border-radius:14px;max-height:440px;object-fit:cover;margin-bottom:32px;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.article-cover-ph{width:100%;height:320px;border-radius:14px;background:linear-gradient(135deg,var(--navy),#1e3a8a);display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:80px;color:rgba(255,255,255,.12);margin-bottom:32px}

/* Article content */
.article-content{background:#fff;border:1px solid var(--border);border-radius:14px;padding:2rem 2.5rem;line-height:1.85;color:var(--text);font-size:15px}
.article-content p{margin-bottom:1.2rem}
.article-content h1,.article-content h2,.article-content h3{font-family:'Noto Serif TC',serif;color:var(--navy);margin:1.8rem 0 .8rem}
.article-content h2{font-size:20px}
.article-content h3{font-size:17px}
.article-content strong{color:var(--navy)}
.article-content em{color:var(--text-2)}
.article-content ul,.article-content ol{padding-left:1.5rem;margin-bottom:1.2rem}
.article-content li{margin-bottom:.5rem}
.article-content code{background:#f4f5f7;padding:1px 7px;border-radius:4px;font-size:13px;color:var(--navy)}
.article-content pre{background:#f4f5f7;padding:1rem;border-radius:8px;overflow-x:auto;margin-bottom:1.2rem;font-size:13px;line-height:1.7}
.article-content blockquote{border-left:4px solid var(--blue);padding-left:1rem;color:var(--text-2);font-style:italic;margin-bottom:1.2rem}
.article-content hr{border:none;border-top:1px solid var(--border);margin:2rem 0}
/* Chinese text */
.article-content .zh{font-family:'Noto Serif TC',serif;font-size:18px;color:var(--navy)}

.back-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--text-2);padding:6px 14px;border-radius:7px;margin-top:24px;transition:all .15s}
.back-btn:hover{color:var(--blue);border-color:var(--blue);background:var(--blue-lt)}

footer{background:#111827;color:rgba(255,255,255,.6);font-size:13px;margin-top:auto}
.footer-bottom{border-top:1px solid rgba(255,255,255,.08);padding:16px 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;max-width:1100px;margin:0 auto}
.footer-bottom-links{display:flex;gap:1.5rem}
.footer-bottom-links a{color:rgba(255,255,255,.4)}
.footer-bottom-links a:hover{color:rgba(255,255,255,.7)}
@media(max-width:640px){.nav-link{display:none}.article-content{padding:1.25rem 1rem}}
</style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a class="nav-brand" href="/about.html">
      <img src="images/logo.jpg" alt="TOCFL FAFA">
      <span class="nav-brand-text">TOCFL <em>FAFA</em></span>
    </a>
    <div class="nav-menu">
      <a class="nav-link" href="/lessons.html">Bài học</a>
      <a class="nav-link" href="/flashcards.html">Flashcard</a>
      <a class="nav-link" href="/courses.html">Khóa học</a>
      <a class="nav-link" href="/about.html">Giới thiệu</a>
      <a class="nav-link active" href="/blog.html">Blog</a>
      <a class="nav-btn" href="/login.html">Bắt đầu học</a>
    </div>
  </div>
</nav>

<div class="article-wrap" id="article-wrap">
  <div class="breadcrumb">
    <a href="/blog.html">Blog</a>
    <i class="fa-solid fa-chevron-right"></i>
    <span id="bc-title" style="color:var(--text)">Đang tải…</span>
  </div>
  <div id="article-content" style="color:var(--text-2);text-align:center;padding:3rem">Đang tải bài viết…</div>
</div>

<footer>
  <div class="footer-bottom">
    <span>TOCFL FAFA © 2026</span>
    <div class="footer-bottom-links">
      <a href="/lessons.html">Bài học</a>
      <a href="/blog.html">Blog</a>
      <a href="/about.html">Giới thiệu</a>
    </div>
  </div>
</footer>

<script>
const db = supabase.createClient(
  'https://prctmferugkxabyizslx.supabase.co',
  'sb_publishable_6-_0uUkFDKDCA4HBNdB0Gg_ZEL_GqJQ'
);

function renderMarkdown(text) {
  return (text || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^>>r (.+)$/gm,'<p style="text-align:right">$1</p>')
    .replace(/^>>c (.+)$/gm,'<p style="text-align:center">$1</p>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^[-•] (.+)$/gm,'• $1')
    .replace(/^---$/gm,'<hr>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+?)\*/g,'<em>$1</em>')
    .replace(/__([^_\n]+?)__/g,'<u>$1</u>')
    .replace(/~~([^~\n]+?)~~/g,'<s>$1</s>')
    .replace(/==r:([^=\n]+)==/g,'<mark style="background:#fecaca;padding:1px 3px;border-radius:3px">$1</mark>')
    .replace(/==g:([^=\n]+)==/g,'<mark style="background:#bbf7d0;padding:1px 3px;border-radius:3px">$1</mark>')
    .replace(/==b:([^=\n]+)==/g,'<mark style="background:#bfdbfe;padding:1px 3px;border-radius:3px">$1</mark>')
    .replace(/==([^=\n:][^=\n]*)==/g,'<mark style="background:#fef08a;padding:1px 3px;border-radius:3px">$1</mark>')
    .replace(/\n{2,}/g,'</p><p>')
    .replace(/\n/g,'<br>');
}

function fmt(d) { return new Date(d).toLocaleDateString('vi-VN', {year:'numeric',month:'long',day:'numeric'}); }

async function init() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { document.getElementById('article-content').textContent = 'Không tìm thấy bài viết.'; return; }

  const { data: post } = await db.from('posts').select('*').eq('id', id).single();
  if (!post) { document.getElementById('article-content').textContent = 'Bài viết không tồn tại.'; return; }

  document.title = post.title + ' — TOCFL FAFA';
  document.getElementById('bc-title').textContent = post.title;

  const coverHtml = post.cover_url
    ? `<img class="article-cover" src="${post.cover_url}" alt="${post.title}">`
    : `<div class="article-cover-ph">文</div>`;

  document.getElementById('article-content').innerHTML = `
    ${post.category ? `<span class="article-cat">${post.category}</span>` : ''}
    <h1 class="article-title">${post.title}</h1>
    <div class="article-meta">
      <span><i class="fa-regular fa-calendar"></i> ${fmt(post.created_at)}</span>
      <span><i class="fa-regular fa-user"></i> ${post.author || 'Admin'}</span>
      ${post.category ? `<span><i class="fa-solid fa-tag"></i> ${post.category}</span>` : ''}
    </div>
    ${coverHtml}
    <div class="article-content"><p>${renderMarkdown(post.content || post.excerpt || '')}</p></div>
    <a href="/blog.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Quay lại Blog</a>
  `;
}

init();
</script>
</body>
</html>
