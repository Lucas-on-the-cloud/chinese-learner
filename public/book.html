<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài học — TOCFL FAFA</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Be Vietnam Pro',sans-serif;font-size:15px;color:#1f2937;background:#f4f5f7;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
:root{
  --blue:#1a56db;--blue-dark:#1544b8;--blue-lt:#eff6ff;
  --orange:#f47b20;--navy:#0d1b4b;
  --text:#1f2937;--text-2:#6b7280;--text-3:#9ca3af;
  --bg:#f4f5f7;--surface:#ffffff;--border:#e5e7eb;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 10px 40px rgba(0,0,0,.10);
  --r:10px;--danger:#c0392b;
}
.container{max-width:1100px;margin:0 auto;padding:0 1.5rem}

/* NAVBAR */
.navbar{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid var(--border);height:62px;display:flex;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.navbar .container{display:flex;align-items:center;justify-content:space-between;width:100%}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-brand img{height:32px;border-radius:5px}
.nav-brand-text{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--navy)}
.nav-brand-text em{color:var(--orange);font-style:normal}
.nav-menu{display:flex;align-items:center;gap:2px}
.nav-link{font-size:14px;font-weight:500;color:var(--text-2);padding:6px 12px;border-radius:6px;transition:all .15s;white-space:nowrap}
.nav-link:hover{color:var(--text);background:#f3f4f6}
.nav-link.active{color:var(--blue);font-weight:600}
.nav-btn{font-size:13px;font-weight:600;color:#fff;background:var(--blue);padding:7px 18px;border-radius:7px;margin-left:8px;transition:background .15s;white-space:nowrap}
.nav-btn:hover{background:var(--blue-dark)}

/* CONTENT HEADER */
.content-header{background:linear-gradient(135deg,var(--navy) 0%,#1e3a8a 100%);padding:40px 1.5rem 48px;position:relative;overflow:hidden}
.content-header::after{content:'讀';position:absolute;font-family:'Noto Serif TC',serif;font-size:260px;font-weight:700;color:rgba(255,255,255,.04);bottom:-80px;right:4%;pointer-events:none}
.ch-back{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.65);font-size:12px;font-weight:500;background:rgba(255,255,255,.1);padding:5px 14px;border-radius:6px;margin-bottom:1rem;transition:all .15s}
.ch-back:hover{color:#fff;background:rgba(255,255,255,.18)}
.content-header h1{font-family:'Noto Serif TC',serif;font-size:clamp(22px,3vw,32px);font-weight:700;color:#fff;margin-bottom:.5rem;line-height:1.3}
.content-header p{font-size:13px;color:rgba(255,255,255,.65);line-height:1.7;max-width:560px}
.ch-cover{width:80px;height:120px;object-fit:cover;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);float:left;margin:0 20px 8px 0}

/* MAIN */
.app-main{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:28px 1.5rem 60px}
.page-sub{font-size:13px;color:var(--text-2);margin-bottom:1.25rem}

/* LESSON CARDS */
.lesson-group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.lgc{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s}
.lgc:hover{border-color:#c7d7fd;box-shadow:var(--shadow);transform:translateY(-3px)}
.lgc-thumb{height:76px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:10px 12px}
.lgc-wm{position:absolute;font-family:'Noto Serif TC',serif;font-size:88px;font-weight:700;color:rgba(255,255,255,.07);top:-14px;right:6px;line-height:1;pointer-events:none}
.lgc-badge{font-size:10px;font-weight:600;color:rgba(255,255,255,.9);background:rgba(255,255,255,.15);padding:3px 8px;border-radius:4px;position:relative;z-index:1}
.lgc-body{padding:10px 13px 12px}
.lgc-title{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lgc-sub{font-size:11px;color:var(--text-2);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lgc-zh{font-family:'Noto Serif TC',serif;font-size:11px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* FOOTER */
footer{background:#111827;color:rgba(255,255,255,.6);font-size:13px;margin-top:auto}
.footer-bottom{border-top:1px solid rgba(255,255,255,.08);padding:16px 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;max-width:1100px;margin:0 auto}
.footer-bottom-links{display:flex;gap:1.5rem}
.footer-bottom-links a{color:rgba(255,255,255,.4);transition:color .15s}
.footer-bottom-links a:hover{color:rgba(255,255,255,.7)}
@media(max-width:640px){.nav-link{display:none}}
</style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a class="nav-brand" href="/about.html">
      <img src="images/logo.jpg" alt="TOCFL FAFA">
      <span class="nav-brand-text">TOCFL <em>FAFA</em></span>
    </a>
    <div class="nav-menu">
      <a class="nav-link active" href="/lessons.html">Bài học</a>
      <a class="nav-link" href="/flashcards.html">Flashcard</a>
      <a class="nav-link" href="/courses.html">Khóa học</a>
      <a class="nav-link" href="/about.html">Giới thiệu</a>
      <a class="nav-link" href="https://www.facebook.com/tocflfafa/" target="_blank" rel="noopener">Blog</a>
      <a class="nav-btn" href="/lessons.html">Bắt đầu học</a>
    </div>
  </div>
</nav>

<div class="content-header" id="ch">
  <div class="container">
    <a href="/lessons.html" class="ch-back"><i class="fas fa-arrow-left"></i> &nbsp;Tất cả sách</a>
    <img id="ch-cover" class="ch-cover" src="" alt="" style="display:none">
    <h1 id="ch-title">Đang tải...</h1>
    <p id="ch-desc"></p>
  </div>
</div>

<main class="app-main">
  <div class="page-sub" id="pg-sub"></div>
  <div class="lesson-group-grid" id="lesson-grid">
    <p style="color:var(--text-2)">Đang tải bài học...</p>
  </div>
</main>

<footer>
  <div class="footer-bottom">
    <span>TOCFL FAFA © 2026</span>
    <div class="footer-bottom-links">
      <a href="/lessons.html">Bài học</a>
      <a href="/flashcards.html">Flashcard</a>
      <a href="/about.html">Giới thiệu</a>
    </div>
  </div>
</footer>

<script src="js/database.js"></script>
<script>
(async () => {
  const DB_URL = 'https://prctmferugkxabyizslx.supabase.co';
  const DB_KEY = 'sb_publishable_6-_0uUkFDKDCA4HBNdB0Gg_ZEL_GqJQ';
  const db   = new Database(DB_URL, DB_KEY);
  const book = decodeURIComponent(new URLSearchParams(location.search).get('b') || 'B1');

  const GRADIENTS = [
    ['#0d1b4b','#1e3a8a'],['#064e3b','#065f46'],
    ['#4c1d95','#5b21b6'],['#7f1d1d','#991b1b'],['#0c4a6e','#075985'],
  ];

  const [rawLessons, metaList] = await Promise.all([db.getLessons(), db.getBooksMeta()]);

  const lessons = (rawLessons || [])
    .filter(l => (l.book || 'B1') === book)
    .map(l => ({ id: l.id, book: l.book||'B1', title: l.title, desc: l.description, zh: l.chinese, py: l.pinyin, vi: l.vietnamese }));

  const meta = (metaList || []).find(m => m.name === book) || {};
  const displayTitle = meta.display_name || `Quyển sách ${book}`;

  // Update header
  document.getElementById('ch-title').textContent = displayTitle;
  document.getElementById('ch-desc').textContent  = meta.description || '';
  document.title = displayTitle + ' — TOCFL FAFA';
  document.getElementById('pg-sub').textContent = `${lessons.length} bài học trong quyển này`;

  if (meta.cover_url) {
    const img = document.getElementById('ch-cover');
    img.src = meta.cover_url; img.style.display = 'block';
  }

  // Group by title prefix
  const groupMap = new Map();
  lessons.forEach(l => {
    const sep = l.title.indexOf(' · ');
    const key = sep > -1 ? l.title.slice(0, sep) : l.title;
    if (!groupMap.has(key)) groupMap.set(key, []);
    groupMap.get(key).push(l);
  });

  if (!groupMap.size) {
    document.getElementById('lesson-grid').innerHTML =
      '<p style="color:var(--text-2);padding:2rem 0">Chưa có bài học nào trong quyển này.</p>';
    return;
  }

  const cardsHTML = [...groupMap.entries()].map(([groupKey, grpLessons], gi) => {
    const first = grpLessons[0];
    const wm    = (first.zh || '').match(/[一-鿿]/)?.[0] || '讀';
    const [c1,c2] = GRADIENTS[gi % GRADIENTS.length];

    const subs = grpLessons.map(l => {
      const sep = l.title.indexOf(' · ');
      if (sep < 0) return '';
      const rest = l.title.slice(sep + 3);
      const dash = rest.indexOf(' — ');
      return dash > -1 ? rest.slice(0, dash) : rest;
    }).filter(Boolean);

    const subLine    = subs.join(', ') || (first.desc || '');
    const preview    = (first.zh || '').replace(/\n/g,'').slice(0, 36);
    const ids        = grpLessons.map(l => l.id);
    const countLabel = ids.length > 1 ? `${ids.length} bài đọc` : 'Bài đọc';
    const href       = `/reading.html?ids=${ids.join(',')}&b=${encodeURIComponent(book)}`;

    return `<div class="lgc" onclick="location.href='${href}'">
      <div class="lgc-thumb" style="background:linear-gradient(135deg,${c1},${c2})">
        <span class="lgc-wm">${wm}</span>
        <span class="lgc-badge">${countLabel}</span>
      </div>
      <div class="lgc-body">
        <div class="lgc-title">${groupKey}</div>
        ${subLine ? `<div class="lgc-sub">${subLine}</div>` : ''}
        <div class="lgc-zh">${preview}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('lesson-grid').innerHTML = cardsHTML;
})();
</script>
</body>
</html>
